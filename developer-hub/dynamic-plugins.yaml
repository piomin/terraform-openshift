  # Global Header
  - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-global-header
    disabled: false
    pluginConfig:
      app:
        sidebar:
          search: false
          settings: false
          logo: false
      dynamicPlugins:
        frontend:
          default.main-menu-items:
            menuItems:
              default.create:
                title: ''
          red-hat-developer-hub.backstage-plugin-global-header:
            mountPoints:
              - mountPoint: application/header
                importName: GlobalHeader
                config:
                  position: above-sidebar # above-main-content | above-sidebar
              - mountPoint: global.header/component
                importName: CompanyLogo
                config:
                  priority: 200
                  props:
                    to: '/'
              - mountPoint: global.header/component
                importName: SearchComponent
                config:
                  priority: 100
              - mountPoint: global.header/component
                importName: Spacer
                config:
                  priority: 99
                  props:
                    growFactor: 0
              - mountPoint: global.header/component
                importName: HeaderIconButton
                config:
                  priority: 90
                  props:
                    title: Self-service
                    icon: add
                    to: create
              - mountPoint: global.header/component
                importName: StarredDropdown
                config:
                  priority: 85

              - mountPoint: global.header/component
                importName: ApplicationLauncherDropdown
                config:
                  priority: 82

              - mountPoint: global.header/application-launcher
                importName: MenuItemLink
                config:
                  section: Documentation
                  priority: 150
                  props:
                    title: Developer Hub
                    icon: developerHub
                    link: https://docs.redhat.com/en/documentation/red_hat_developer_hub

              - mountPoint: global.header/application-launcher
                importName: MenuItemLink
                config:
                  section: Developer Tools
                  priority: 100
                  props:
                    title: RHDH Local
                    icon: developerHub
                    link: https://github.com/redhat-developer/rhdh-local

              - mountPoint: global.header/component
                importName: HelpDropdown
                config:
                  priority: 80

              - mountPoint: global.header/help
                importName: SupportButton
                config:
                  priority: 10

              - mountPoint: global.header/component
                importName: NotificationButton
                config:
                  priority: 70
              - mountPoint: global.header/component
                importName: Divider
                config:
                  priority: 50
              - mountPoint: global.header/component
                importName: ProfileDropdown
                config:
                  priority: 10
              - mountPoint: global.header/profile
                importName: MenuItemLink
                config:
                  priority: 100
                  props:
                    title: Settings
                    link: /settings
                    icon: manageAccounts
              - mountPoint: global.header/profile
                importName: MenuItemLink
                config:
                  priority: 90
                  props:
                    title: My profile
                    icon: account
              - mountPoint: global.header/profile
                importName: LogoutButton
                config:
                  priority: 10

  # Group: Global floating action button
  - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-global-floating-action-button
    disabled: false
    pluginConfig:
      dynamicPlugins:
        frontend:
          red-hat-developer-hub.backstage-plugin-global-floating-action-button:
            mountPoints:
              - mountPoint: application/listener
                importName: DynamicGlobalFloatingActionButton

  # Group: Quickstart
  - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-quickstart
    disabled: false
    pluginConfig:
      app:
        quickstart:
          - title: Set up authentication
            icon: Admin
            description: Set up secure login credentials to protect your account from unauthorized access.
            cta:
              text: Learn more
              link: https://docs.redhat.com/en/documentation/red_hat_developer_hub/latest/html/authentication_in_red_hat_developer_hub/
          - title: Configure RBAC
            icon: Rbac
            description: Assign roles and permissions to control who can view, create, or edit resources, ensuring secure and efficient collaboration.
            cta:
              text: Manage access
              link: /rbac
          - title: Configure Git
            icon: Git
            description: Connect your Git providers, such as GitHub to manage code, automate workflows, and integrate with platform features.
            cta:
              text: Learn more
              link: https://docs.redhat.com/en/documentation/red_hat_developer_hub/latest/html/integrating_red_hat_developer_hub_with_github/
          - title: Manage plugins
            icon: Plugins
            description: Browse and install extensions to add features, connect with external tools, and customize your experience.
            cta:
              text: Explore plugins
              link: /extensions
      dynamicPlugins:
        frontend:
          red-hat-developer-hub.backstage-plugin-quickstart:
            mountPoints:
              - mountPoint: application/provider
                importName: QuickstartDrawerProvider
              - mountPoint: global.header/help
                importName: QuickstartButton
                config:
                  priority: 100

  # Quay
  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-quay-backend:bs_1.45.3__1.10.1
    disabled: true
    pluginConfig:
      quay:
        apiUrl: https://quay.io
  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-quay:bs_1.45.3__1.28.1
    disabled: true
    pluginConfig:
      dynamicPlugins:
        frontend:
          backstage-community.plugin-quay:
            mountPoints:
              - mountPoint: entity.page.image-registry/cards
