    pluginConfig:
      argocd:
        username: ${ARGOCD_USERNAME}
        password: ${ARGOCD_PASSWORD}
        appLocatorMethods:
          - type: 'config'
            instances:
              - name: main
                url: "https://openshift-gitops-server-openshift-gitops.apps.${DOMAIN}"
                token: "${ARGOCD_TOKEN}"
  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-argocd:bs_1.45.3__2.4.3
    disabled: true
    pluginConfig:
      dynamicPlugins:
        frontend:
          backstage-community.plugin-argocd:
            translationResources:
              - importName: argocdTranslations
                module: Alpha
                ref: argocdTranslationRef
            mountPoints:
              - mountPoint: entity.page.overview/cards
                importName: ArgocdDeploymentSummary
                config:
                  layout:
                    gridColumnEnd:
                      lg: span 8
                      xs: span 12
                  if:
                    allOf:
                      - isArgocdConfigured
              - mountPoint: entity.page.cd/cards
                importName: ArgocdDeploymentLifecycle
                config:
                  layout:
                    gridColumn: 1 / -1
                  if:
                    allOf:
                      - isArgocdConfigured
  - package: ./dynamic-plugins/dist/roadiehq-backstage-plugin-argo-cd-backend-dynamic
    disabled: false
    pluginConfig:
      argocd:
        appLocatorMethods:
          - type: 'config'
            instances:
              - name: main
                url: "https://openshift-gitops-server-openshift-gitops.apps.${DOMAIN}"
                token: "${ARGOCD_TOKEN}"
  - package: ./dynamic-plugins/dist/roadiehq-scaffolder-backend-argocd-dynamic
    disabled: false
    pluginConfig:
      argocd:
        appLocatorMethods:
          - type: 'config'
            instances:
              - name: main
                url: "https://openshift-gitops-server-openshift-gitops.apps.${DOMAIN}"
                token: "${ARGOCD_TOKEN}"
  - package: ./dynamic-plugins/dist/roadiehq-backstage-plugin-argo-cd
    disabled: true
    pluginConfig:
      dynamicPlugins:
        frontend:
          roadiehq.backstage-plugin-argo-cd:
            mountPoints:
              - mountPoint: entity.page.overview/cards
                importName: EntityArgoCDOverviewCard
                config:
                  layout:
                    gridColumnEnd:
                      lg: "span 8"
                      xs: "span 12"
                  if:
                    allOf:
                      - isArgocdAvailable
              - mountPoint: entity.page.cd/cards
                importName: EntityArgoCDHistoryCard
                config:
                  layout:
                    gridColumn: "1 / -1"
                  if:
                    allOf:
                      - isArgocdAvailable
  - package: ./dynamic-plugins/dist/backstage-community-plugin-redhat-argocd
    disabled: true
    pluginConfig:
      dynamicPlugins:
        frontend:
          backstage-community.plugin-redhat-argocd:
            mountPoints:
              - mountPoint: entity.page.overview/cards
                importName: ArgocdDeploymentSummary
                config:
                  layout:
                    gridColumnEnd:
                      lg: "span 8"
                      xs: "span 12"
                  if:
                    allOf:
                      - isArgocdConfigured
              - mountPoint: entity.page.cd/cards
                importName: ArgocdDeploymentLifecycle
                config:
                  layout:
                    gridColumn: '1 / -1'
                  if:
                    allOf:
                      - isArgocdConfigured

  # Group: Azure Devops
